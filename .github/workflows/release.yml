name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & Package
        run: npm run pack

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: AGFun ${{ github.ref_name }}
          files: release/agfun-*.zip
          generate_release_notes: true
