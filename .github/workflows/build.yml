name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & Package
        run: npm run pack

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agfun-build
          path: release/agfun-*.zip
          retention-days: 7
